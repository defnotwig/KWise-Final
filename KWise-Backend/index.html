<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC WISE Login Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .login-form {
            background: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background-color: #dff0d8;
            color: #3c763d;
        }
        .error {
            background-color: #f2dede;
            color: #a94442;
        }
    </style>
</head>
<body>
    <div class="login-form">
        <h1>PC WISE Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required value="admin@pcwise.com">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" required value="Admin@123">
            </div>
            <button type="submit">Login</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            // Clear previous results
            resultDiv.className = '';
            resultDiv.style.display = 'none';
            
            // Show that we're testing different API endpoints
            resultDiv.textContent = 'Testing API endpoints...';
            resultDiv.style.display = 'block';
            
            // First, try the health endpoint
            fetch('http://localhost:5000/api/health')
                .then(response => {
                    if (response.ok) {
                        resultDiv.textContent = 'Health endpoint works! Now trying login...';
                        return response.json();
                    } else {
                        throw new Error('Health endpoint failed with status: ' + response.status);
                    }
                })
                .then(data => {
                    console.log('Health endpoint response:', data);
                    
                    // Now try the login endpoint
                    return fetch('http://localhost:5000/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });
                })
                .then(response => {
                    if (response.ok) {
                        resultDiv.className = 'success';
                        return response.json();
                    } else {
                        resultDiv.className = 'error';
                        throw new Error('Login failed with status: ' + response.status);
                    }
                })
                .then(data => {
                    console.log('Login response:', data);
                    resultDiv.textContent = 'Login successful! Token: ' + data.token;
                })
                .catch(error => {
                    console.error('Error:', error);
                    resultDiv.className = 'error';
                    resultDiv.textContent = 'Error: ' + error.message;
                });
        });
    </script>
</body>
</html>
