# 🚀 PostgreSQL Configuration for Hyper-V with 2TB NVMe SSD
# Optimized for K-Wise Admin System
# Created: Phase 3.1 - Database Optimization
# Target: Sub-100ms query times

# ============================================================
# MEMORY CONFIGURATION (Assuming 32GB RAM on Hyper-V)
# ============================================================

# Shared memory for PostgreSQL
# Rule: 25% of total RAM
shared_buffers = 8GB

# Kernel's disk cache size estimate
# Rule: 75% of total RAM
effective_cache_size = 24GB

# Working memory per operation
# Rule: (Total RAM * 0.25) / max_connections
work_mem = 64MB

# Maintenance operations memory
# Rule: 2GB for large databases
maintenance_work_mem = 2GB

# ============================================================
# NVMe SSD OPTIMIZATIONS
# ============================================================

# Random page access cost
# Default: 4.0 for HDD
# NVMe SSD: 1.1 (much faster random access)
random_page_cost = 1.1

# Sequential page access cost (baseline)
seq_page_cost = 1.0

# Effective I/O concurrency
# NVMe supports high concurrency
effective_io_concurrency = 200

# ============================================================
# WRITE-AHEAD LOG (WAL) CONFIGURATION
# ============================================================

# WAL buffer size
# Rule: 16MB for high write workloads
wal_buffers = 16MB

# Minimum WAL size to keep
min_wal_size = 1GB

# Maximum WAL size before checkpoint
max_wal_size = 4GB

# Checkpoint completion target
# 0.9 = smooth writes over 90% of checkpoint interval
checkpoint_completion_target = 0.9

# Checkpoint timeout
# Default: 5min, increased for better performance
checkpoint_timeout = 10min

# ============================================================
# CONNECTION POOLING
# ============================================================

# Maximum connections
# Hyper-V can handle more connections
max_connections = 200

# ============================================================
# QUERY PLANNER CONFIGURATION
# ============================================================

# Default statistics target
# Higher = better query plans but slower ANALYZE
default_statistics_target = 100

# Enable parallel query execution
max_parallel_workers_per_gather = 4
max_parallel_workers = 8

# ============================================================
# LOGGING & MONITORING
# ============================================================

# Log queries slower than 1 second
log_min_duration_statement = 1000

# Log checkpoints for monitoring
log_checkpoints = on

# Log connections for security
log_connections = on
log_disconnections = on

# Log lock waits longer than 1 second
log_lock_waits = on

# Destination for logs
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'

# Log rotation
log_rotation_age = 1d
log_rotation_size = 100MB

# ============================================================
# VACUUM & AUTOVACUUM (Prevent Bloat)
# ============================================================

# Enable autovacuum
autovacuum = on

# Aggressive autovacuum for NVMe (can handle I/O)
autovacuum_max_workers = 4
autovacuum_naptime = 30s

# Vacuum cost delay (lower = faster vacuum)
autovacuum_vacuum_cost_delay = 10ms

# ============================================================
# HYPER-V SPECIFIC OPTIMIZATIONS
# ============================================================

# Synchronous commit
# off = faster writes, small risk of data loss on crash
# on = safer but slower
# local = good balance for Hyper-V
synchronous_commit = local

# Full page writes
# on = protects against partial page writes
full_page_writes = on

# ============================================================
# ZEROTIER NETWORK OPTIMIZATIONS
# ============================================================

# Listen on all interfaces (for ZeroTier access)
listen_addresses = '*'

# Maximum time to wait for connection
# Increased for ZeroTier latency
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6

# ============================================================
# PERFORMANCE MONITORING EXTENSIONS
# ============================================================

# Enable pg_stat_statements for query analysis
shared_preload_libraries = 'pg_stat_statements'

# Track query statistics
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# ============================================================
# NOTES & USAGE INSTRUCTIONS
# ============================================================

# To apply this configuration:
# 1. Copy this file to PostgreSQL config directory
#    Windows: C:\Program Files\PostgreSQL\{version}\data\
#    Linux: /etc/postgresql/{version}/main/
#
# 2. Backup existing postgresql.conf:
#    Copy-Item postgresql.conf postgresql.conf.backup
#
# 3. Merge settings into postgresql.conf or include this file:
#    Add to postgresql.conf: include = 'postgresql-hyperv.conf'
#
# 4. Restart PostgreSQL:
#    Windows: Restart-Service postgresql-x64-{version}
#    Linux: sudo systemctl restart postgresql
#
# 5. Verify settings:
#    psql -U postgres -c "SHOW shared_buffers;"
#    psql -U postgres -c "SHOW random_page_cost;"
#
# 6. Test performance:
#    node KWise-Backend/analyze-database.js
#
# Expected Results:
# - Query times: <100ms for most queries
# - Cache hit ratio: >95%
# - No table bloat
# - Efficient checkpoint operations
